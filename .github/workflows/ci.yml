name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Creer fichier .env
        run: |
          cat > .env <<EOF
          DB_HOST=mysql
          DB_PORT=3306
          DB_NAME=labo04_db
          DB_USER=labo04_user
          DB_PASSWORD=labo04_pass
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_DB=0
          EOF

      - name: Normaliser les fins de ligne (CRLF -> LF)
        run: sed -i 's/\r$//' redis_entrypoint.sh

      - name: Creer le reseau Docker
        run: docker network create labo04-network || true

      - name: Demarrer la stack
        run: docker-compose up -d --build

      - name: Attendre que MySQL soit pret
        run: |
          for i in $(seq 1 40); do
            if docker-compose exec -T mysql mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL accepte les connexions TCP"; sleep 5; break
            fi
            echo "Attente MySQL... ($i)"; sleep 5
          done

      - name: Run tests
        run: docker-compose exec -T store_manager python -m pytest tests -v

      - name: Nettoyer
        if: always()
        run: |
          docker-compose down -v || true
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" || true